<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iParking - 停车记录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="iParking">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        :root {
            --primary-color: #5e8bff;
            --primary-dark: #4a6fd6;
            --bg-color: #0f1525;
            --glass-bg: rgba(30, 35, 50, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --text-secondary: #a0a8c3;
            --success-color: #4cd964;
            --danger-color: #ff3b30;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(94, 139, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(100, 80, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 40% 60%, rgba(30, 150, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 磨砂玻璃效果 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }
        
        /* 标题栏 */
        .header {
            padding: 20px 0;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-color), #8a9dff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header h1 i {
            font-size: 30px;
        }
        
        /* 当前停车位置显示 */
        .current-parking {
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .current-parking h2 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .current-location {
            font-size: 22px;
            font-weight: 600;
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        
        .current-location.empty {
            color: var(--text-secondary);
            font-weight: normal;
        }
        
        .no-parking {
            color: var(--text-secondary);
            font-style: italic;
        }
        
        /* 预设停车位按钮 */
        .preset-buttons {
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .preset-buttons h2 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        .preset-btn {
            padding: 16px 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-color);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .preset-btn:hover, .preset-btn:active {
            background: rgba(94, 139, 255, 0.2);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }
        
        .preset-btn i {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        /* 记录按钮 */
        .record-section {
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .record-btn {
            width: 100%;
            padding: 24px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(94, 139, 255, 0.3);
        }
        
        .record-btn:hover, .record-btn:active {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(94, 139, 255, 0.4);
        }
        
        /* 临时停车记录 */
        .temp-parking {
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .temp-parking h2 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .temp-input-container {
            display: flex;
            gap: 10px;
        }
        
        .temp-input {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--text-color);
            font-size: 16px;
        }
        
        .temp-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .save-temp-btn {
            padding: 0 24px;
            background: var(--primary-color);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .save-temp-btn:hover, .save-temp-btn:active {
            background: var(--primary-dark);
        }
        
        /* 底部预设停车位 */
        .preset-footer {
            margin-top: auto;
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .preset-footer h3 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .preset-footer-buttons {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .footer-preset-btn {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .footer-preset-btn:hover, .footer-preset-btn:active {
            background: rgba(94, 139, 255, 0.15);
            color: var(--text-color);
        }
        
        /* 状态消息 */
        .status-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            padding: 12px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-color);
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.4s ease;
            box-shadow: var(--shadow);
        }
        
        .status-message.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* 滚动条样式 */
        .preset-footer-buttons::-webkit-scrollbar {
            height: 4px;
        }
        
        .preset-footer-buttons::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .preset-footer-buttons::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }
        
        /* 响应式调整 */
        @media (max-height: 700px) {
            .header {
                padding: 15px 0;
                margin-bottom: 15px;
            }
            
            .current-parking, .preset-buttons, .record-section, .temp-parking {
                padding: 15px;
                margin-bottom: 15px;
            }
            
            .record-btn {
                padding: 20px;
            }
            
            .preset-btn {
                padding: 14px 8px;
            }
        }
        
        /* 保存到桌面提示 */
        .save-to-home {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px 16px;
            color: var(--text-color);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 100;
            box-shadow: var(--shadow);
            animation: pulse 2s infinite;
        }
        
        .save-to-home i {
            font-size: 18px;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(94, 139, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(94, 139, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(94, 139, 255, 0); }
        }
        
        /* 图标样式 */
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1><i class="icon">🚗</i> iParking</h1>
        </div>
        
        <!-- 当前停车位置 -->
        <div class="current-parking glass">
            <h2><i class="icon">📍</i> 当前停车位置</h2>
            <div id="currentLocation" class="current-location empty">暂无停车记录</div>
        </div>
        
        <!-- 预设停车位 -->
        <div class="preset-buttons glass">
            <h2><i class="icon">🏢</i> 预设停车位</h2>
            <div class="preset-grid">
                <div class="preset-btn" data-location="家庭车位">
                    <i class="icon">🏠</i>
                    <span>家庭车位</span>
                </div>
                <div class="preset-btn" data-location="公司停车场A区">
                    <i class="icon">🏢</i>
                    <span>公司A区</span>
                </div>
                <div class="preset-btn" data-location="公司停车场B区">
                    <i class="icon">🏢</i>
                    <span>公司B区</span>
                </div>
                <div class="preset-btn" data-location="购物中心地下车库">
                    <i class="icon">🛍️</i>
                    <span>购物中心</span>
                </div>
                <div class="preset-btn" data-location="健身房停车场">
                    <i class="icon">💪</i>
                    <span>健身房</span>
                </div>
                <div class="preset-btn" data-location="电影院停车场">
                    <i class="icon">🎬</i>
                    <span>电影院</span>
                </div>
            </div>
        </div>
        
        <!-- 记录当前停车位置按钮 -->
        <div class="record-section">
            <button id="recordBtn" class="record-btn glass">
                <i class="icon">📌</i> 记录当前位置
            </button>
        </div>
        
        <!-- 临时停车记录 -->
        <div class="temp-parking glass">
            <h2><i class="icon">📝</i> 临时停车记录</h2>
            <div class="temp-input-container">
                <input type="text" id="tempLocationInput" class="temp-input" placeholder="输入停车位置，如：商场B2层A区12号">
                <button id="saveTempBtn" class="save-temp-btn">保存</button>
            </div>
        </div>
        
        <!-- 底部预设停车位（不显眼） -->
        <div class="preset-footer">
            <h3><i class="icon">⚙️</i> 快速选择</h3>
            <div class="preset-footer-buttons">
                <div class="footer-preset-btn" data-location="家庭车位">家庭</div>
                <div class="footer-preset-btn" data-location="公司停车场A区">公司A</div>
                <div class="footer-preset-btn" data-location="公司停车场B区">公司B</div>
                <div class="footer-preset-btn" data-location="购物中心地下车库">购物中心</div>
                <div class="footer-preset-btn" data-location="健身房停车场">健身房</div>
                <div class="footer-preset-btn" data-location="电影院停车场">电影院</div>
                <div class="footer-preset-btn" data-location="机场停车场">机场</div>
                <div class="footer-preset-btn" data-location="火车站停车场">火车站</div>
            </div>
        </div>
        
        <!-- 状态消息 -->
        <div id="statusMessage" class="status-message">消息</div>
        
        <!-- 保存到桌面提示 -->
        <div id="saveToHome" class="save-to-home glass">
            <i class="icon">📲</i> 保存到桌面
        </div>
    </div>

    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const currentLocationEl = document.getElementById('currentLocation');
            const recordBtn = document.getElementById('recordBtn');
            const presetButtons = document.querySelectorAll('.preset-btn, .footer-preset-btn');
            const saveTempBtn = document.getElementById('saveTempBtn');
            const tempLocationInput = document.getElementById('tempLocationInput');
            const statusMessage = document.getElementById('statusMessage');
            const saveToHome = document.getElementById('saveToHome');
            
            // 从本地存储加载当前停车位置
            loadCurrentLocation();
            
            // 记录当前位置按钮事件
            recordBtn.addEventListener('click', function() {
                // 模拟获取地理位置（在实际应用中，这里应该使用浏览器的Geolocation API）
                // 由于在普通网页中获取精确位置需要用户授权，这里我们使用一个模拟位置
                const mockLocation = "模拟位置：北纬39.9042，东经116.4074";
                
                // 显示获取位置中的状态
                showStatus("获取位置中...", "info");
                
                // 模拟获取位置延迟
                setTimeout(() => {
                    saveParkingLocation(mockLocation, "手动记录");
                    showStatus("当前位置已记录！", "success");
                }, 800);
            });
            
            // 预设停车位按钮事件
            presetButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const location = this.getAttribute('data-location');
                    saveParkingLocation(location, "预设位置");
                    showStatus(`已记录到：${location}`, "success");
                });
            });
            
            // 保存临时停车位置
            saveTempBtn.addEventListener('click', function() {
                const location = tempLocationInput.value.trim();
                if (location) {
                    saveParkingLocation(location, "临时记录");
                    tempLocationInput.value = '';
                    showStatus(`临时位置已记录：${location}`, "success");
                } else {
                    showStatus("请输入停车位置", "error");
                }
            });
            
            // 临时停车输入框回车键支持
            tempLocationInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    saveTempBtn.click();
                }
            });
            
            // 保存到桌面提示
            saveToHome.addEventListener('click', function() {
                showStatus("在浏览器菜单中选择'添加到主屏幕'", "info");
            });
            
            // 检查是否已添加到主屏幕
            if (window.navigator.standalone) {
                saveToHome.style.display = 'none';
            }
            
            // 加载当前停车位置
            function loadCurrentLocation() {
                const savedLocation = localStorage.getItem('iParking-currentLocation');
                const savedTime = localStorage.getItem('iParking-savedTime');
                
                if (savedLocation) {
                    const time = savedTime ? new Date(parseInt(savedTime)).toLocaleString() : "未知时间";
                    currentLocationEl.textContent = savedLocation;
                    currentLocationEl.classList.remove('empty');
                    currentLocationEl.title = `记录时间：${time}`;
                } else {
                    currentLocationEl.textContent = "暂无停车记录";
                    currentLocationEl.classList.add('empty');
                }
            }
            
            // 保存停车位置
            function saveParkingLocation(location, type) {
                // 保存到本地存储
                localStorage.setItem('iParking-currentLocation', location);
                localStorage.setItem('iParking-savedTime', Date.now().toString());
                localStorage.setItem('iParking-locationType', type);
                
                // 更新显示
                loadCurrentLocation();
                
                // 保存到历史记录
                saveToHistory(location, type);
            }
            
            // 保存到历史记录
            function saveToHistory(location, type) {
                let history = JSON.parse(localStorage.getItem('iParking-history') || '[]');
                
                // 添加到历史记录
                history.unshift({
                    location: location,
                    type: type,
                    timestamp: Date.now()
                });
                
                // 只保留最近的20条记录
                if (history.length > 20) {
                    history = history.slice(0, 20);
                }
                
                localStorage.setItem('iParking-history', JSON.stringify(history));
            }
            
            // 显示状态消息
            function showStatus(message, type) {
                statusMessage.textContent = message;
                
                // 根据类型设置颜色
                if (type === 'success') {
                    statusMessage.style.background = 'rgba(76, 217, 100, 0.9)';
                } else if (type === 'error') {
                    statusMessage.style.background = 'rgba(255, 59, 48, 0.9)';
                } else {
                    statusMessage.style.background = 'var(--glass-bg)';
                }
                
                statusMessage.classList.add('show');
                
                // 3秒后隐藏
                setTimeout(() => {
                    statusMessage.classList.remove('show');
                }, 3000);
            }
            
            // 添加一些示例数据（首次使用）
            if (!localStorage.getItem('iParking-firstVisit')) {
                // 设置首次访问标志
                localStorage.setItem('iParking-firstVisit', 'true');
                
                // 添加一些示例历史记录
                const exampleHistory = [
                    { location: "家庭车位", type: "预设位置", timestamp: Date.now() - 86400000 * 2 },
                    { location: "公司停车场B区", type: "预设位置", timestamp: Date.now() - 86400000 * 1 },
                    { location: "购物中心地下车库3层B区", type: "临时记录", timestamp: Date.now() - 43200000 }
                ];
                
                localStorage.setItem('iParking-history', JSON.stringify(exampleHistory));
            }
        });
        
        // 添加Web App安装提示
        window.addEventListener('beforeinstallprompt', (e) => {
            // 防止Chrome 67及更早版本自动显示提示
            e.preventDefault();
            // 存储事件以便稍后触发
            window.deferredPrompt = e;
            
            // 显示添加到主屏幕按钮
            const saveToHome = document.getElementById('saveToHome');
            saveToHome.style.display = 'flex';
            
            saveToHome.addEventListener('click', () => {
                // 显示安装提示
                e.prompt();
                // 等待用户响应
                e.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('用户已添加到主屏幕');
                    }
                    // 清除保存的事件
                    window.deferredPrompt = null;
                });
            });
        });
    </script>
</body>
</html>
